<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castaway — Navigate the Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    /* ── Page setup ── */
    body {
      background: #060e1c;
      color: #e8edf5;
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       SCROLL TRACK — 4× viewport tall so the
       sticky scene has enough room to animate
    ───────────────────────────────────────── */
    #scroll-track {
      height: 500vh;
      position: relative;
    }

    /* ── Sticky viewport ── */
    #sticky-scene {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Canvas sits behind everything ── */
    #portal-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(to right, transparent, #5bb8d4, transparent);
      z-index: 30;
      transition: width 0.05s linear;
    }

    /* ── HUD: compass logo top-left ── */
    #compass-hud {
      position: absolute;
      top: 1.5rem;
      left: 1.75rem;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #compass-hud.visible { opacity: 1; transform: translateY(0); }
    #compass-hud svg { width: 26px; height: 26px; color: #5bb8d4; animation: spin 30s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #compass-hud .hud-name {
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      color: #5bb8d4;
      text-transform: uppercase;
    }

    /* ── HUD: depth counter top-right ── */
    #depth-counter {
      position: absolute;
      top: 1.5rem;
      right: 1.75rem;
      z-index: 20;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: rgba(91,184,212,0.55);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #depth-counter.visible { opacity: 1; }

    /* ── Centre content ── */
    #scene-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 1.5rem;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .phase-label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(91,184,212,0.7);
      margin-bottom: 1rem;
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: #e8edf5;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .main-title .accent { color: #5bb8d4; }

    .sub-title {
      margin-top: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: rgba(232,237,245,0.4);
      text-transform: uppercase;
    }

    /* ── Enter button (shown at end) ── */
    #enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      border: 1px solid rgba(91,184,212,0.5);
      border-radius: 3rem;
      background: rgba(91,184,212,0.08);
      color: #5bb8d4;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      pointer-events: all;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s, border-color 0.2s;
    }
    #enter-btn.visible { opacity: 1; transform: translateY(0); }
    #enter-btn:hover { background: rgba(91,184,212,0.2); border-color: #5bb8d4; }
    #enter-btn svg { width: 0.9rem; height: 0.9rem; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Skip button ── */
    #skip-btn {
      position: absolute;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 30;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(91,184,212,0.35);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      transition: color 0.2s;
    }
    #skip-btn:hover { color: rgba(91,184,212,0.8); }

    /* ── Scroll hint ── */
    #scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.4s ease;
    }
    #scroll-hint span {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(91,184,212,0.45);
      text-transform: uppercase;
    }
    .scroll-line {
      width: 1px;
      height: 2.5rem;
      background: linear-gradient(to bottom, rgba(91,184,212,0.5), transparent);
      animation: scrollPulse 1.8s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
      50%       { opacity: 1;   transform: scaleY(1); }
    }

    /* ── Stage label bottom-centre ── */
    #stage-label {
      position: absolute;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(91,184,212,0.4);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #stage-label.visible { opacity: 1; }

    /* ── Full-screen transition overlay ── */
    #transition-overlay {
      position: fixed;
      inset: 0;
      background: #060e1c;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    #transition-overlay.fade-in  { opacity: 1; pointer-events: all; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      #compass-hud { top: 1rem; left: 1rem; }
      #depth-counter { top: 1rem; right: 1rem; font-size: 0.6rem; }
      #skip-btn { bottom: 1rem; right: 1rem; }
      #scroll-hint { bottom: 1.25rem; }
      #stage-label { bottom: 3.5rem; }
    }
  </style>
</head>
<body>

  <!-- Full-screen fade overlay for page transition -->
  <div id="transition-overlay"></div>

  <div id="scroll-track">
    <div id="sticky-scene">

      <!-- Progress bar -->
      <div id="progress-bar"></div>

      <!-- Canvas -->
      <canvas id="portal-canvas"></canvas>

      <!-- HUD elements -->
      <div id="compass-hud">
        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="20" cy="20" r="18"/>
          <circle cx="20" cy="20" r="2.5" fill="currentColor" stroke="none"/>
          <polygon points="20,4 22,20 20,23 18,20" fill="currentColor" stroke="none" opacity="0.9"/>
          <polygon points="20,36 22,20 20,17 18,20" fill="currentColor" stroke="none" opacity="0.3"/>
          <polygon points="4,20 20,22 23,20 20,18"  fill="currentColor" stroke="none" opacity="0.6"/>
          <polygon points="36,20 20,22 17,20 20,18" fill="currentColor" stroke="none" opacity="0.3"/>
        </svg>
        <span class="hud-name">Castaway</span>
      </div>

      <div id="depth-counter">
        Depth: <span id="depth-val">0</span>m
      </div>

      <!-- Centre content -->
      <div id="scene-content">
        <p class="phase-label" id="phase-label">Navigate the weather</p>
        <h1 class="main-title" id="main-title">
          Set Your<br/><span class="accent">Course</span>
        </h1>
        <p class="sub-title" id="sub-title">Scroll to enter the portal</p>

        <button id="enter-btn" aria-label="Enter Castaway weather app">
          Enter Castaway
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

      <!-- Scroll hint -->
      <div id="scroll-hint">
        <span>Scroll</span>
        <div class="scroll-line"></div>
      </div>

      <!-- Stage label -->
      <p id="stage-label"></p>

      <!-- Skip -->
      <button id="skip-btn">Skip intro</button>

    </div>
  </div>

  <script>
    'use strict';

    /* ── Canvas setup ── */
    const canvas = document.getElementById('portal-canvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /* ── Scroll state ── */
    const TOTAL_SCROLL = document.getElementById('scroll-track').scrollHeight - window.innerHeight;
    let   progress     = 0;

    window.addEventListener('scroll', () => {
      progress = Math.min(window.scrollY / (TOTAL_SCROLL * 0.85), 1);
      updateUI(progress);
    }, { passive: true });

    /* ── Helpers ── */
    const lerp   = (a, b, t) => a + (b - a) * t;
    const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function easeIn3(t)   { return t * t * t; }

    /* ── Stage copy ── */
    const STAGES = [
      { at: 0,    label: '' },
      { at: 0.06, label: 'Approaching the portal…' },
      { at: 0.22, label: 'Entering the vortex…' },
      { at: 0.50, label: 'Breaking through…' },
      { at: 0.72, label: 'Emerging into clear skies…' },
      { at: 0.90, label: 'You have arrived' },
    ];

    function getStageLabel(p) {
      let label = '';
      for (const s of STAGES) { if (p >= s.at) label = s.label; }
      return label;
    }

    /* ── UI updates ── */
    function updateUI(p) {
      /* progress bar */
      document.getElementById('progress-bar').style.width = (p * 100) + '%';

      /* HUD */
      document.getElementById('compass-hud').classList.toggle('visible', p > 0.06);
      document.getElementById('depth-counter').classList.toggle('visible', p > 0.06);
      document.getElementById('depth-val').textContent =
        Math.round(p * 8500).toLocaleString();

      /* scroll hint */
      document.getElementById('scroll-hint').style.opacity = p < 0.04 ? '1' : '0';

      /* stage label */
      const sl    = document.getElementById('stage-label');
      const label = getStageLabel(p);
      sl.textContent = label;
      sl.classList.toggle('visible', label.length > 0 && p < 0.92);

      /* centre content */
      const content  = document.getElementById('scene-content');
      const phaseEl  = document.getElementById('phase-label');
      const titleEl  = document.getElementById('main-title');
      const subEl    = document.getElementById('sub-title');
      const enterBtn = document.getElementById('enter-btn');

      if (p < 0.04) {
        /* Phase 0 — intro */
        phaseEl.textContent   = 'Navigate the weather';
        titleEl.innerHTML     = 'Set Your<br/><span class="accent">Course</span>';
        subEl.textContent     = 'Scroll to enter the portal';
        content.style.opacity = '1';
        enterBtn.classList.remove('visible');

      } else if (p < 0.42) {
        /* Phase 1 — fading out as portal pulls us in */
        const t = clamp((p - 0.04) / 0.38, 0, 1);
        content.style.opacity = (1 - t).toFixed(3);
        enterBtn.classList.remove('visible');

      } else if (p < 0.56) {
        /* Phase 2 — black hole centre, content hidden */
        content.style.opacity = '0';
        enterBtn.classList.remove('visible');

      } else if (p < 0.72) {
        /* Phase 3 — emerge, fade new content in */
        phaseEl.textContent = 'The weather awaits';
        titleEl.innerHTML   = 'Cast<span class="accent">away</span>';
        subEl.textContent   = 'Real-time · Precise · Beautiful';
        const t = clamp((p - 0.56) / 0.16, 0, 1);
        content.style.opacity = easeInOut(t).toFixed(3);
        enterBtn.classList.remove('visible');

      } else {
        /* Phase 4 — fully arrived */
        phaseEl.textContent   = 'The weather awaits';
        titleEl.innerHTML     = 'Cast<span class="accent">away</span>';
        subEl.textContent     = 'Real-time · Precise · Beautiful';
        content.style.opacity = '1';
        enterBtn.classList.add('visible');
      }
    }

    /* ── Drawing ── */

    function drawStarField(p, cx, cy, w, h) {
      const stars = [
        [0.12,0.15,1.4],[0.88,0.08,1.1],[0.25,0.30,1.6],[0.72,0.22,1.2],
        [0.50,0.05,1.0],[0.08,0.45,1.3],[0.93,0.40,1.1],[0.35,0.18,1.5],
        [0.65,0.12,1.2],[0.15,0.60,1.0],[0.82,0.55,1.3],[0.42,0.08,1.4],
        [0.58,0.35,1.1],[0.28,0.52,1.6],[0.78,0.48,1.2],[0.05,0.28,1.0],
        [0.95,0.25,1.3],[0.48,0.25,1.5],[0.22,0.38,1.1],[0.75,0.32,1.4],
      ];
      const zoom  = easeIn3(clamp(p / 0.48, 0, 1));
      const alpha = 1 - clamp((p - 0.28) / 0.2, 0, 1);
      stars.forEach(([nx, ny, sz], i) => {
        const ox = (nx - 0.5) * w;
        const oy = (ny - 0.5) * h;
        const sx = cx + ox * (1 + zoom * 4);
        const sy = cy + oy * (1 + zoom * 4);
        ctx.beginPath();
        ctx.arc(sx, sy, sz, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${180+(i%5)*14},${200+(i%3)*10},255,${alpha*(0.4+(i%4)*0.15)})`;
        ctx.fill();
      });
    }

    function drawWaves(p, w, h) {
      const alpha = (1 - clamp((p - 0.38) / 0.15, 0, 1)) * 0.07;
      const phase = performance.now() * 0.00048;
      for (let i = 0; i < 8; i++) {
        const yBase = (h / 8) * (i + 0.5);
        ctx.beginPath();
        ctx.strokeStyle = `rgba(91,184,212,${alpha})`;
        ctx.lineWidth   = 0.8;
        for (let x = 0; x <= w; x += 2) {
          const y = yBase + Math.sin((x / 200) + phase + i * 0.85) * 22;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawPortalRings(p, cx, cy, w, h) {
      const maxR    = Math.min(w, h) * 0.48;
      const numRings = 16;
      const pullIn  = easeInOut(clamp(p / 0.5, 0, 1));
      const pushOut = p > 0.5 ? easeIn3(clamp((p - 0.5) / 0.14, 0, 1)) : 0;
      const now     = performance.now() * 0.0003;

      /* Static rings */
      for (let i = numRings; i >= 0; i--) {
        const base  = i / numRings;
        let   r     = maxR * base * (1 - pullIn * 0.86) + pushOut * maxR * 1.7 * base;
        if (r < 1) continue;

        const rShift = Math.round(lerp(91,  190, pullIn * base));
        const gShift = Math.round(lerp(184, 220, pullIn * base));
        const bShift = Math.round(lerp(212, 255, pullIn * base));
        const alpha  = clamp((1 - base) * 0.9 + 0.06, 0, 1);
        const glow   = i < 5 && p > 0.1;

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${rShift},${gShift},${bShift},${alpha * 0.28})`;
        ctx.lineWidth   = glow ? 1.8 : 0.7;
        ctx.stroke();

        if (glow) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(91,184,212,${0.14 * (1 - base)})`;
          ctx.lineWidth   = 8;
          ctx.stroke();
        }
      }

      /* Core glow */
      if (p > 0.05) {
        const innerR    = maxR * (1 - pullIn * 0.86) * 0.09 + pushOut * maxR * 0.14;
        const coreAlpha = clamp(pullIn * 2, 0, 1) * (1 - pushOut);
        if (innerR > 1) {
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR * 3.5);
          grad.addColorStop(0,   `rgba(255,255,255,${coreAlpha * 0.65})`);
          grad.addColorStop(0.3, `rgba(91,184,212,${coreAlpha * 0.38})`);
          grad.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(cx, cy, innerR * 3.5, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }
      }

      /* Orbiting cyan dots — outer ring */
      const outerR = maxR * (0.96 - pullIn * 0.84) * (1 - pushOut * 0.92);
      if (outerR > 3) {
        const n = 52;
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 + now * (1 + pullIn * 2.2);
          ctx.beginPath();
          ctx.arc(cx + Math.cos(ang) * outerR, cy + Math.sin(ang) * outerR,
                  1.6 + (i % 3) * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(91,184,212,${0.18 + pullIn * 0.28})`;
          ctx.fill();
        }
      }

      /* Orbiting amber dots — inner ring */
      const innerR2 = maxR * (0.60 - pullIn * 0.53) * (1 - pushOut * 0.92);
      if (innerR2 > 3) {
        const n = 26;
        for (let i = 0; i < n; i++) {
          const ang = (i / n) * Math.PI * 2 - now * 0.85;
          ctx.beginPath();
          ctx.arc(cx + Math.cos(ang) * innerR2, cy + Math.sin(ang) * innerR2,
                  1.2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(240,164,88,${0.28 + pullIn * 0.22})`;
          ctx.fill();
        }
      }
    }

    function drawEmergeLight(p, cx, cy, w, h) {
      const t = clamp((p - 0.44) / 0.25, 0, 1);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(w, h) * 0.75 * t);
      grad.addColorStop(0,   `rgba(91,184,212,${t * 0.24})`);
      grad.addColorStop(0.45, `rgba(13,24,41,${t * 0.3})`);
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawSkyGlow(p, cx, cy, w, h) {
      const t = clamp((p - 0.68) / 0.32, 0, 1);
      const grad = ctx.createRadialGradient(cx, cy * 0.35, 0, cx, cy * 0.35, w * 0.9);
      grad.addColorStop(0,   `rgba(91,184,212,${t * 0.09})`);
      grad.addColorStop(0.55,'rgba(8,14,25,0)');
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawScene(p) {
      const w  = canvas.width, h = canvas.height;
      const cx = w / 2,        cy = h / 2;

      ctx.clearRect(0, 0, w, h);

      /* Background — deep navy */
      const bg = Math.round(lerp(6, 9, p));
      ctx.fillStyle = `rgb(${bg},${Math.round(bg*1.45)},${Math.round(bg*2.7)})`;
      ctx.fillRect(0, 0, w, h);

      if (p < 0.62) drawStarField(p, cx, cy, w, h);
      drawWaves(p, w, h);
      drawPortalRings(p, cx, cy, w, h);
      if (p > 0.44) drawEmergeLight(p, cx, cy, w, h);
      if (p > 0.68) drawSkyGlow(p, cx, cy, w, h);
    }

    /* ── Animation loop ── */
    function loop() {
      drawScene(progress);
      requestAnimationFrame(loop);
    }
    loop();
    updateUI(0);

    /* ─────────────────────────────────────────
       PAGE TRANSITION — fade to black then
       navigate to the Castaway weather app
    ───────────────────────────────────────── */
    function launchApp() {
      const overlay = document.getElementById('transition-overlay');
      overlay.classList.add('fade-in');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    }

    document.getElementById('enter-btn').addEventListener('click', launchApp);
    document.getElementById('skip-btn').addEventListener('click',  launchApp);

    /* Auto-launch when scroll animation fully completes */
    let autoLaunched = false;
    window.addEventListener('scroll', () => {
      if (!autoLaunched && window.scrollY >= document.getElementById('scroll-track').scrollHeight - window.innerHeight - 10) {
        autoLaunched = true;
        setTimeout(launchApp, 600);
      }
    }, { passive: true });
  </script>
</body>
</html>
